<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="theme-color" content="#080808">
<title>TITANS STRIKE · GALALA</title>
<link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;600;700;900&family=Cinzel+Decorative:wght@400;700&family=Barlow+Condensed:wght@300;400;600&display=swap" rel="stylesheet">
<style>
:root {
  --ink:       #080808;
  --ink-mid:   #141210;
  --crimson:   #8B0015;
  --red:       #C0001A;
  --red-hot:   #E8001F;
  --gold:      #C8A84B;
  --gold-lit:  #E2C06A;
  --gold-pale: #F5E4A8;
  --parchment: #EDE5CC;
  --stone:     #3A3530;
  --ash:       #6B6259;
}
*,*::before,*::after{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent;}
html,body{width:100%;height:100%;overflow:hidden;background:var(--ink);touch-action:none;}
body{font-family:'Barlow Condensed',sans-serif;color:var(--parchment);user-select:none;-webkit-user-select:none;}

/* ═══ CANVAS ═══ */
#gc{display:block;position:fixed;inset:0;}

/* ═══ SCREENS ═══ */
.scr{
  position:fixed;inset:0;display:flex;flex-direction:column;
  align-items:center;justify-content:center;z-index:200;
  background:rgba(8,8,8,0.96);overflow-y:auto;overflow-x:hidden;
  padding:env(safe-area-inset-top,0) env(safe-area-inset-right,0) env(safe-area-inset-bottom,0) env(safe-area-inset-left,0);
}
.scr.off{display:none;}
/* Roman border overlay */
.scr::before{
  content:'';position:absolute;inset:12px;pointer-events:none;z-index:0;
  border:1px solid rgba(200,168,75,0.12);
}
.scr::after{
  content:'';position:absolute;inset:0;pointer-events:none;
  background:repeating-linear-gradient(0deg,transparent,transparent 3px,rgba(0,0,0,0.08) 3px,rgba(0,0,0,0.08) 4px);
  z-index:0;
}
.scr>*{position:relative;z-index:1;}

/* ═══ ORNAMENT DIVIDER ═══ */
.orn{
  display:flex;align-items:center;gap:.8rem;margin:.6rem 0;
  color:var(--gold);font-size:.75rem;letter-spacing:3px;
}
.orn::before,.orn::after{content:'';flex:1;height:1px;background:linear-gradient(90deg,transparent,rgba(200,168,75,0.5),transparent);}

/* ═══ CREST / BADGE ═══ */
.crest{
  font-family:'Cinzel Decorative',serif;font-size:.6rem;letter-spacing:4px;
  color:var(--gold);border:1px solid rgba(200,168,75,0.3);
  padding:.4rem 1.4rem;margin-bottom:1.2rem;text-transform:uppercase;
  background:rgba(200,168,75,0.04);
}

/* ═══ TITLE ═══ */
.main-title{
  font-family:'Cinzel Decorative',serif;
  font-size:clamp(2.2rem,8vw,5rem);
  line-height:1;text-align:center;
  color:var(--gold-lit);
  text-shadow:0 2px 30px rgba(200,168,75,0.3),0 0 60px rgba(192,0,26,0.2);
  letter-spacing:2px;margin-bottom:.3rem;
}
.main-title span{color:var(--red);text-shadow:0 2px 30px rgba(192,0,26,0.5);}
.sub-title{
  font-family:'Cinzel',serif;font-size:clamp(.65rem,2vw,.85rem);
  letter-spacing:6px;color:var(--ash);margin-bottom:1.8rem;text-transform:uppercase;
}

/* ═══ BUTTONS ═══ */
.btn{
  font-family:'Cinzel',serif;font-size:clamp(.85rem,2.5vw,1rem);
  letter-spacing:4px;padding:.9rem 2.5rem;cursor:pointer;
  text-transform:uppercase;transition:all .25s cubic-bezier(.34,1.56,.64,1);
  border:none;outline:none;display:block;text-align:center;
}
.btn-primary{
  background:linear-gradient(135deg,var(--crimson),var(--red));
  color:var(--gold-pale);border:1px solid rgba(200,168,75,0.4);
  box-shadow:0 4px 20px rgba(192,0,26,0.35);
}
.btn-primary:hover,.btn-primary:active{
  background:linear-gradient(135deg,var(--red),var(--red-hot));
  box-shadow:0 6px 30px rgba(192,0,26,0.6);transform:translateY(-2px);
}
.btn-ghost{
  background:transparent;color:var(--ash);
  border:1px solid rgba(107,98,89,0.35);font-size:.75rem;letter-spacing:3px;
  padding:.6rem 1.8rem;margin-top:.6rem;
}
.btn-ghost:hover,.btn-ghost:active{color:var(--parchment);border-color:var(--ash);}

/* ═══ NAME INPUT ═══ */
.name-wrap{display:flex;flex-direction:column;align-items:center;gap:.5rem;margin:.8rem 0;}
.name-wrap label{font-family:'Cinzel',serif;font-size:.65rem;letter-spacing:4px;color:var(--ash);}
.name-wrap input{
  background:rgba(200,168,75,0.04);border:1px solid rgba(200,168,75,0.25);
  color:var(--gold-lit);padding:.7rem 1.2rem;font-family:'Cinzel',serif;
  font-size:1rem;letter-spacing:3px;text-align:center;width:min(260px,80vw);
  text-transform:uppercase;outline:none;transition:border-color .25s;
}
.name-wrap input:focus{border-color:var(--gold);}

/* ═══ CHARACTER SELECT ═══ */
#screen-chars{padding:1rem .5rem;}
.char-grid{
  display:grid;
  grid-template-columns:repeat(2,1fr);
  gap:.6rem;
  width:min(480px,96vw);
  margin:1rem 0;
}
.char-card{
  border:1px solid rgba(200,168,75,0.18);
  background:linear-gradient(160deg,rgba(20,18,16,0.9),rgba(12,10,8,0.95));
  padding:.7rem;cursor:pointer;transition:all .25s;
  position:relative;overflow:hidden;
  display:flex;flex-direction:column;align-items:center;gap:.4rem;
}
.char-card::before{
  content:'';position:absolute;top:0;left:0;right:0;height:2px;
  background:linear-gradient(90deg,transparent,var(--gold),transparent);
  opacity:0;transition:opacity .25s;
}
.char-card.selected{
  border-color:var(--gold);
  background:linear-gradient(160deg,rgba(200,168,75,0.08),rgba(139,0,21,0.06));
  box-shadow:0 0 20px rgba(200,168,75,0.15),inset 0 0 20px rgba(200,168,75,0.04);
}
.char-card.selected::before{opacity:1;}
.char-card:active{transform:scale(.97);}
.char-canvas{width:80px;height:100px;display:block;}
.char-name{font-family:'Cinzel',serif;font-size:.75rem;letter-spacing:3px;color:var(--gold-lit);text-transform:uppercase;}
.char-role{font-size:.6rem;letter-spacing:2px;color:var(--ash);text-transform:uppercase;}
.char-stats{display:flex;flex-direction:column;gap:3px;width:100%;padding:0 .2rem;}
.stat-row{display:flex;align-items:center;gap:.4rem;}
.stat-key{font-size:.55rem;letter-spacing:2px;color:var(--ash);width:38px;text-transform:uppercase;}
.stat-bar-bg{flex:1;height:3px;background:rgba(255,255,255,0.06);}
.stat-bar-fill{height:100%;transition:width .4s;}
.char-card.selected .stat-bar-fill{background:var(--gold);}
.stat-bar-fill{background:var(--crimson);}

/* ═══ HUD ═══ */
#hud{
  position:fixed;top:0;left:0;right:0;z-index:100;
  display:flex;align-items:center;justify-content:space-between;
  padding:.5rem 1rem;
  padding-top:max(.5rem,env(safe-area-inset-top));
  background:rgba(8,8,8,0.9);backdrop-filter:blur(8px);
  border-bottom:1px solid rgba(200,168,75,0.12);
}
#hud.off{display:none;}
.hud-block{display:flex;flex-direction:column;align-items:center;gap:1px;}
.hud-lbl{font-family:'Cinzel',serif;font-size:.45rem;letter-spacing:3px;color:var(--gold);text-transform:uppercase;}
.hud-val{font-family:'Cinzel',serif;font-size:1.1rem;line-height:1;color:var(--parchment);}
#htimer{color:var(--gold);}
#htimer.warn{color:var(--red);animation:blink .5s infinite;}
.lives-row{display:flex;gap:5px;}
.ldot{width:8px;height:8px;border-radius:50%;background:var(--red);box-shadow:0 0 6px rgba(192,0,26,0.6);}
.ldot.dead{background:#1a1a1a;box-shadow:none;}
@keyframes blink{0%,100%{opacity:1}50%{opacity:.4}}

/* ═══ COMBO ═══ */
#combo{
  position:fixed;bottom:140px;left:50%;transform:translateX(-50%);
  font-family:'Cinzel Decorative',serif;font-size:1.5rem;letter-spacing:3px;
  color:var(--gold-lit);text-shadow:0 0 20px rgba(200,168,75,0.6);
  z-index:90;opacity:0;transition:opacity .3s;pointer-events:none;white-space:nowrap;
}

/* ═══ FLASH ═══ */
#flash{position:fixed;inset:0;z-index:180;pointer-events:none;background:rgba(192,0,26,0.3);opacity:0;transition:opacity .08s;}

/* ═══ MOBILE JOYSTICK + FIRE ═══ */
#mctrl{
  position:fixed;bottom:0;left:0;right:0;z-index:110;
  display:flex;justify-content:space-between;align-items:flex-end;
  padding:.8rem 1.2rem max(1rem,env(safe-area-inset-bottom));
  pointer-events:none;
}
#mctrl.off{display:none;}
#joystick-zone{
  width:110px;height:110px;border-radius:50%;
  background:rgba(200,168,75,0.04);border:1px solid rgba(200,168,75,0.15);
  position:relative;pointer-events:all;touch-action:none;flex-shrink:0;
}
#joystick-knob{
  position:absolute;width:44px;height:44px;border-radius:50%;
  background:radial-gradient(circle at 35% 35%,rgba(200,168,75,0.6),rgba(139,0,21,0.5));
  border:1px solid rgba(200,168,75,0.4);
  top:50%;left:50%;transform:translate(-50%,-50%);
  box-shadow:0 0 12px rgba(200,168,75,0.2);
  transition:box-shadow .1s;
}
#fire-btn{
  width:72px;height:72px;border-radius:50%;
  background:radial-gradient(circle at 35% 35%,rgba(192,0,26,0.7),rgba(139,0,21,0.9));
  border:1px solid rgba(200,168,75,0.35);
  font-family:'Cinzel',serif;font-size:.6rem;letter-spacing:2px;
  color:var(--gold-pale);pointer-events:all;touch-action:none;cursor:pointer;
  display:flex;align-items:center;justify-content:center;
  box-shadow:0 0 16px rgba(192,0,26,0.4);flex-shrink:0;
  -webkit-tap-highlight-color:transparent;
}
#fire-btn:active{transform:scale(.92);box-shadow:0 0 30px rgba(192,0,26,0.7);}

/* ═══ SCORE POPUP ═══ */
.spop{
  position:fixed;font-family:'Cinzel',serif;font-size:1rem;letter-spacing:2px;
  color:var(--gold-lit);z-index:120;pointer-events:none;text-shadow:0 0 12px rgba(200,168,75,0.7);
  animation:popUp .7s ease-out forwards;
}
@keyframes popUp{0%{opacity:1;transform:translateY(0)}100%{opacity:0;transform:translateY(-60px)}}

/* ═══ LEADERBOARD ═══ */
.lb-wrap{
  background:rgba(200,168,75,0.03);border:1px solid rgba(200,168,75,0.15);
  padding:1.2rem 1.5rem;width:min(360px,90vw);margin:.8rem 0;
}
.lb-title{font-family:'Cinzel Decorative',serif;font-size:.9rem;letter-spacing:4px;color:var(--gold);text-align:center;margin-bottom:1rem;}
.lb-row{
  display:flex;justify-content:space-between;align-items:center;
  padding:.4rem 0;border-bottom:1px solid rgba(255,255,255,0.04);
  font-family:'Cinzel',serif;font-size:.75rem;letter-spacing:2px;
}
.lb-row:last-child{border-bottom:none;}
.lb-rank{color:var(--red);width:22px;}
.lb-name{flex:1;padding:0 .6rem;color:var(--parchment);}
.lb-score{color:var(--gold);}
.lb-row.hl{background:rgba(200,168,75,0.07);}

/* ═══ FINAL SCORE ═══ */
.final-num{
  font-family:'Cinzel Decorative',serif;
  font-size:clamp(3rem,12vw,6rem);
  color:var(--gold-lit);text-shadow:0 0 40px rgba(200,168,75,0.4);
  line-height:1;margin:.4rem 0;
}
.final-rank{font-family:'Cinzel',serif;font-size:.75rem;letter-spacing:5px;color:var(--red);margin-bottom:1.2rem;text-transform:uppercase;}
@keyframes shake{0%,100%{transform:translate(0)}20%{transform:translate(-5px,3px)}40%{transform:translate(4px,-3px)}60%{transform:translate(-3px,2px)}80%{transform:translate(3px,-2px)}}

/* ═══ CROSSHAIR ═══ */
#xhair{position:fixed;width:28px;height:28px;z-index:300;pointer-events:none;transform:translate(-50%,-50%);}
</style>
</head>

  <line x1="14" y1="20" x2="14" y2="27" stroke="#C8A84B" stroke-width="1"/>
  <line x1="1" y1="14" x2="8" y2="14" stroke="#C8A84B" stroke-width="1"/>

<script>
/* ═══════════════════════════════════════════
   ROMAN NUMERAL HELPER
═══════════════════════════════════════════ */
function toRoman(n){
  const v=[1000,900,500,400,100,90,50,40,10,9,5,4,1];
  const s=['M','CM','D','CD','C','XC','L','XL','X','IX','V','IV','I'];
  let r='';
  v.forEach((val,i)=>{while(n>=val){r+=s[i];n-=val;}});
  return r||'I';
}

/* ═══════════════════════════════════════════
   CANVAS SETUP
═══════════════════════════════════════════ */
const cv=document.getElementById('gc');
const cx=cv.getContext('2d');
function resize(){cv.width=window.innerWidth;cv.height=window.innerHeight;}
resize();
window.addEventListener('resize',resize);

/* ═══════════════════════════════════════════
   AUDIO ENGINE
═══════════════════════════════════════════ */
const AC=new(window.AudioContext||window.webkitAudioContext)();
function wake(){if(AC.state==='suspended')AC.resume();}

function sfxShoot(){
  wake();
  const b=AC.createBuffer(1,AC.sampleRate*.07,AC.sampleRate);
  const d=b.getChannelData(0);
  for(let i=0;i<d.length;i++)d[i]=(Math.random()*2-1)*Math.exp(-i/(AC.sampleRate*.012));
  const s=AC.createBufferSource();s.buffer=b;
  const g=AC.createGain();g.gain.setValueAtTime(.18,AC.currentTime);g.gain.exponentialRampToValueAtTime(.001,AC.currentTime+.08);
  const f=AC.createBiquadFilter();f.type='bandpass';f.frequency.value=1400;f.Q.value=.6;
  s.connect(f);f.connect(g);g.connect(AC.destination);s.start();
}

function sfxDamage(){
  wake();
  const o=AC.createOscillator(),g=AC.createGain();
  o.type='sawtooth';
  o.frequency.setValueAtTime(200,AC.currentTime);
  o.frequency.exponentialRampToValueAtTime(55,AC.currentTime+.28);
  g.gain.setValueAtTime(.28,AC.currentTime);g.gain.exponentialRampToValueAtTime(.001,AC.currentTime+.3);
  o.connect(g);g.connect(AC.destination);o.start();o.stop(AC.currentTime+.3);
}

function sfxExplode(){
  wake();
  const b=AC.createBuffer(1,AC.sampleRate*.22,AC.sampleRate);
  const d=b.getChannelData(0);
  for(let i=0;i<d.length;i++)d[i]=(Math.random()*2-1)*Math.exp(-i/(AC.sampleRate*.055));
  const s=AC.createBufferSource();s.buffer=b;
  const g=AC.createGain();g.gain.setValueAtTime(.38,AC.currentTime);g.gain.exponentialRampToValueAtTime(.001,AC.currentTime+.22);
  const lp=AC.createBiquadFilter();lp.type='lowpass';lp.frequency.value=700;
  s.connect(lp);lp.connect(g);g.connect(AC.destination);s.start();
}

function sfxCombo(){
  wake();
  [440,554,660,880].forEach((f,i)=>{
    const o=AC.createOscillator(),g=AC.createGain(),t=AC.currentTime+i*.07;
    o.type='triangle';o.frequency.value=f;
    g.gain.setValueAtTime(.1,t);g.gain.exponentialRampToValueAtTime(.001,t+.18);
    o.connect(g);g.connect(AC.destination);o.start(t);o.stop(t+.18);
  });
}

let bgOn=false,bgNodes=[];
function bgStart(){
  if(bgOn)return;bgOn=true;wake();
  const BPM=132,beat=60/BPM;
  const bass=[55,55,67,55,55,67,65,55];
  const mel=[0,0,3,5,7,5,3,0,0,0,5,7,10,7,5,3];
  function note(freq,type,vol,start,dur){
    const o=AC.createOscillator(),g=AC.createGain();
    o.type=type;o.frequency.value=freq;
    g.gain.setValueAtTime(vol,start);g.gain.exponentialRampToValueAtTime(.001,start+dur);
    o.connect(g);g.connect(AC.destination);o.start(start);o.stop(start+dur);
    bgNodes.push(o,g);
  }
  function playBass(s){
    if(!bgOn)return;
    const n=bass[s%bass.length],f=440*Math.pow(2,(n-69)/12);
    note(f,'square',.1,AC.currentTime,beat*.75);
    setTimeout(()=>playBass(s+1),beat*1000);
  }
  const mBase=220,mSteps=mel.map(s=>mBase*Math.pow(2,s/12));
  function playMel(s){
    if(!bgOn)return;
    note(mSteps[s%mSteps.length],'triangle',.045,AC.currentTime,beat*1.4);
    setTimeout(()=>playMel(s+1),beat*500);
  }
  function playHat(){
    if(!bgOn)return;
    const b=AC.createBuffer(1,AC.sampleRate*.035,AC.sampleRate);
    const d=b.getChannelData(0);
    for(let i=0;i<d.length;i++)d[i]=(Math.random()*2-1)*Math.exp(-i/180);
    const s=AC.createBufferSource();s.buffer=b;
    const g=AC.createGain();g.gain.value=.03;
    const hp=AC.createBiquadFilter();hp.type='highpass';hp.frequency.value=7000;
    s.connect(hp);hp.connect(g);g.connect(AC.destination);s.start();
    bgNodes.push(s);
    setTimeout(playHat,beat*500);
  }
  playBass(0);setTimeout(()=>{if(bgOn)playMel(0);},beat*4000);playHat();
}
function bgStop(){
  bgOn=false;
  bgNodes.forEach(n=>{try{n.stop&&n.stop();n.disconnect&&n.disconnect();}catch(e){}});
  bgNodes=[];
}

/* ═══════════════════════════════════════════
   CHARACTERS
═══════════════════════════════════════════ */
const CHARS=[
  {
    id:'legionary',name:'LEGIONARY',role:'Vanguard',
    color:'#C8A84B',trim:'#E2C06A',
    spd:240,fire:.15,dmg:1,shield:3,
    stats:{speed:60,fire:70,power:80},
    draw(x,y,angle,ctx){
      ctx.save();ctx.translate(x,y);ctx.rotate(angle);
      // Shield + body

function initStars(){
  stars=[];
  for(let i=0;i<100;i++)stars.push({x:Math.random()*cv.width,y:Math.random()*cv.height,r:Math.random()*1.2+.2,spd:Math.random()*18+4,a:Math.random()*.4+.08});

/* ═══════════════════════════════════════════
   INIT GAME
═══════════════════════════════════════════ */
function initGame(){
  score=0;lives=LIVES;wave=1;timeLeft=DURATION;
  combo=0;comboT=0;shootCD=0;spawnT=0;
  bullets=[];eBullets=[];enemies=[];parts=[];
  P.x=cv.width/2;P.y=cv.height-100;P.invinc=0;

  bgStart();startTimer();

function buildDots(){
  const el=document.getElementById('ldots');el.innerHTML='';
  for(let i=0;i<LIVES;i++){const d=document.createElement('div');d.className='ldot'+(i>=lives?' dead':'');d.id='d'+i;el.appendChild(d);}
}
function refreshDots(){for(let i=0;i<LIVES;i++){const d=document.getElementById('d'+i);if(d)d.className='ldot'+(i>=lives?' dead':'');}}

function startTimer(){
  clearInterval(timerID);
  timerID=setInterval(()=>{
    if(gState!=='play')return;
    timeLeft--;updateHUD();
    const t=document.getElementById('htimer');
    if(timeLeft<=30)t.classList.add('warn'); else t.classList.remove('warn');
    if(timeLeft<=0)endGame();
  },1000);
}

function updateHUD(){
  document.getElementById('hscore').textContent=score.toLocaleString();
  const m=Math.floor(timeLeft/60),s=timeLeft%60;
  document.getElementById('htimer').textContent=`${m}:${s.toString().padStart(2,'0')}`;
  document.getElementById('hwave').textContent=toRoman(wave);
}

/* ═══════════════════════════════════════════
   ENEMIES
═══════════════════════════════════════════ */
const EDEFS=[
  {type:'scout',   hp:1,spd:1.0,sz:16,pts:100,col:'#C8A84B',sRate:0},
  {type:'soldier', hp:2,spd:0.8,sz:22,pts:200,col:'#E25822',sRate:.7},
  {type:'elite',   hp:3,spd:1.2,sz:20,pts:350,col:'#C0001A',sRate:1.4},
  {type:'tribune', hp:5,spd:0.7,sz:30,pts:600,col:'#8B0015',sRate:2.2},
  {type:'caesar',  hp:15,spd:.45,sz:48,pts:2000,col:'#D4AF37',sRate:3},
];

function spawnEnemy(){
  const wm=1+(wave-1)*.18;
  const r=Math.random();
  let def;
  if(wave>=6&&r<.05)def=EDEFS[4];
  else if(wave>=4&&r<.18)def=EDEFS[3];
  else if(wave>=3&&r<.35)def=EDEFS[2];
  else if(wave>=2&&r<.55)def=EDEFS[1];
  else def=EDEFS[0];
  const mg=def.sz+20;
  const side=Math.floor(Math.random()*3);
  let x,y;
  if(side===0){x=mg+Math.random()*(cv.width-mg*2);y=-def.sz;}
  else if(side===1){x=-def.sz;y=mg+Math.random()*cv.height*.5;}
  else{x=cv.width+def.sz;y=mg+Math.random()*cv.height*.5;}
  enemies.push({...def,maxHp:def.hp,x,y,vx:0,vy:0,st:Math.random()*2,wob:Math.random()*Math.PI*2,wm,ang:0});
}

function spawnParts(x,y,col,n){
  for(let i=0;i<n;i++){
    const a=Math.random()*Math.PI*2,sp=60+Math.random()*200;
    parts.push({x,y,vx:Math.cos(a)*sp,vy:Math.sin(a)*sp,life:1,dec:.025+Math.random()*.04,r:2+Math.random()*5,col});
  }
}
function spawnPop(x,y,txt){
  const el=document.createElement('div');
  el.className='spop';el.textContent=txt;
  el.style.left=(x-25)+'px';el.style.top=(y-15)+'px';
  document.body.appendChild(el);

}

   TAKE DAMAGE
═══════════════════════════════════════════ */
function takeDmg(){
  lives--;sfxDamage();
  document.getElementById('flash').style.opacity='1';
  setTimeout(()=>document.getElementById('flash').style.opacity='0',90);
  document.body.style.animation='shake .35s ease';
  setTimeout(()=>document.body.style.animation='',350);

}

/* ═══════════════════════════════════════════
   FIRE BULLET
═══════════════════════════════════════════ */
function fireBullet(){
  const ch=CHARS[selChar];
  const tx=P.invinc>0?mxP:mxP,ty=myP;
  const ang=Math.atan2(ty-P.y,tx-P.x);
  const spd=680;
  // Multi-shot for Imperator
  const count=ch.id==='imperator'?3:1;
  const spread=ch.id==='imperator'?.18:0;
  for(let i=0;i<count;i++){
    const a=ang+(i-Math.floor(count/2))*spread;
    bullets.push({x:P.x,y:P.y,vx:Math.cos(a)*spd,vy:Math.sin(a)*spd,r:ch.id==='centurion'?7:4,dmg:ch.dmg});
  }
  sfxShoot();
  spawnParts(P.x,P.y,'#FFA500',2);
}

/* ═══════════════════════════════════════════
   UPDATE
═══════════════════════════════════════════ */
function update(dt){
  const ch=CHARS[selChar];
  // Movement from keys
  let mvx=0,mvy=0;
  if(keys['ArrowUp']||keys['KeyW'])mvy-=1;
  if(keys['ArrowDown']||keys['KeyS'])mvy+=1;
  if(keys['ArrowLeft']||keys['KeyA'])mvx-=1;
  if(keys['ArrowRight']||keys['KeyD'])mvx+=1;
  // Joystick
  if(joystick.active){mvx+=joystick.dx;mvy+=joystick.dy;}
  const ml=Math.hypot(mvx,mvy);
  if(ml>0){mvx/=ml;mvy/=ml;}
  P.x+=mvx*ch.spd*dt;
  P.y+=mvy*ch.spd*dt;
  const pad=P.w/2+2;
  P.x=Math.max(pad,Math.min(cv.width-pad,P.x));
  P.y=Math.max(60+pad,Math.min(cv.height-pad,P.y));
  if(P.invinc>0)P.invinc-=dt;

  // Mobile auto-aim
  if(window.innerWidth<=768&&enemies.length>0){
    let near=enemies[0],best=Infinity;
    enemies.forEach(e=>{const d=Math.hypot(e.x-P.x,e.y-P.y);if(d<best){best=d;near=e;}});
    mxP=near.x;myP=near.y;
  }

  // Shoot
  shootCD-=dt;
  if(shooting&&shootCD<=0){fireBullet();shootCD=ch.fire;}

  // Combo decay
  if(comboT>0){comboT-=dt;if(comboT<=0){combo=0;document.getElementById('combo').style.opacity='0';}}

  // Spawn
  const sr=Math.max(.35,2.4-wave*.18);
  spawnT-=dt;
  if(spawnT<=0){if(enemies.length<8+wave*2)spawnEnemy();spawnT=sr;}

  // Wave advance
  if(timeLeft<DURATION-wave*35&&enemies.length===0){wave++;sfxCombo();document.getElementById('hwave').textContent=toRoman(wave);spawnParts(cv.width/2,cv.height/2,'#D4AF37',20);}

  // Enemies
  enemies.forEach(e=>{
    e.wob+=dt*2.2;
    const dx=P.x-e.x,dy=P.y-e.y,dist=Math.hypot(dx,dy);
    const sp=e.spd*e.wm*90;
    e.vx+=(dx/dist)*sp*dt*3;e.vy+=(dy/dist)*sp*dt*3;
    const mv=Math.hypot(e.vx,e.vy);if(mv>sp){e.vx=e.vx/mv*sp;e.vy=e.vy/mv*sp;}
    e.x+=e.vx*dt;e.y+=e.vy*dt;
    e.ang=Math.atan2(dy,dx);
    if(e.sRate>0){e.st-=dt;if(e.st<=0){const a=Math.atan2(P.y-e.y,P.x-e.x);eBullets.push({x:e.x,y:e.y,vx:Math.cos(a)*230,vy:Math.sin(a)*230,r:5,col:e.col});e.st=1/(e.sRate*(1+wave*.05));}}
    if(P.invinc<=0&&Math.hypot(e.x-P.x,e.y-P.y)<e.sz+P.w*.38)takeDmg();
  });

  // Player bullets
  bullets=bullets.filter(b=>{
    b.x+=b.vx*dt;b.y+=b.vy*dt;
    if(b.x<0||b.x>cv.width||b.y<0||b.y>cv.height)return false;
    for(let i=enemies.length-1;i>=0;i--){
      const e=enemies[i];
      if(Math.hypot(b.x-e.x,b.y-e.y)<e.sz+b.r){
        e.hp-=b.dmg;spawnParts(b.x,b.y,e.col,5);
        if(e.hp<=0){
          sfxExplode();combo++;comboT=2.5;
          const mult=combo>=5?2:combo>=3?1.5:1;
          const pts=Math.round(e.pts*mult);score+=pts;
          spawnParts(e.x,e.y,e.col,e.type==='caesar'?40:12);
          spawnPop(e.x,e.y,combo>=3?`+${pts} ×${combo}`:`+${pts}`);
          if(combo>=3){const cd=document.getElementById('combo');cd.textContent=`${combo}× COMBO`;cd.style.opacity='1';if(combo>=5)sfxCombo();}
          enemies.splice(i,1);updateHUD();
        }
        return false;
      }
    }
    return true;
  });

  // Enemy bullets
  eBullets=eBullets.filter(b=>{
    b.x+=b.vx*dt;b.y+=b.vy*dt;
    if(b.x<0||b.x>cv.width||b.y<0||b.y>cv.height)return false;
    if(P.invinc<=0&&Math.hypot(b.x-P.x,b.y-P.y)<P.w*.38+b.r){takeDmg();return false;}
    return true;
  });

  // Particles
  parts=parts.filter(p=>{p.x+=p.vx*dt;p.y+=p.vy*dt;p.vy+=70*dt;p.life-=p.dec;return p.life>0;});

  // Stars
  stars.forEach(s=>{s.y+=s.spd*dt;if(s.y>cv.height){s.y=0;s.x=Math.random()*cv.width;}});
}

/* ═══════════════════════════════════════════
   DRAW
═══════════════════════════════════════════ */
function drawEnemy(e){
  cx.save();cx.translate(e.x,e.y);
  cx.shadowColor=e.col;cx.shadowBlur=e.type==='caesar'?28:12;
  if(e.type==='caesar'){
    // Boss: ornate imperial ship
    cx.rotate(e.wob*.08);
    cx.fillStyle=e.col;
    cx.beginPath();
    for(let i=0;i<8;i++){const a=(i/8)*Math.PI*2,r=e.sz*(i%2===0?1:.55);cx.lineTo(Math.cos(a)*r,Math.sin(a)*r);}
    cx.closePath();cx.fill();
    cx.strokeStyle='rgba(245,228,168,.4)';cx.lineWidth=2;cx.stroke();
    // Inner ring
    cx.beginPath();cx.arc(0,0,e.sz*.4,0,Math.PI*2);cx.strokeStyle='rgba(255,220,80,.5)';cx.lineWidth=1.5;cx.stroke();
  } else {
    cx.rotate(e.ang+Math.PI/2);
    cx.fillStyle=e.col;
    cx.beginPath();
    const s=e.sz;
    if(e.type==='tribune'){cx.moveTo(0,-s);cx.lineTo(-s*.8,s*.5);cx.lineTo(-s*.2,s*.2);cx.lineTo(0,s*.6);cx.lineTo(s*.2,s*.2);cx.lineTo(s*.8,s*.5);}
    else{cx.moveTo(0,-s);cx.lineTo(-s*.6,s*.65);cx.lineTo(0,s*.25);cx.lineTo(s*.6,s*.65);}
    cx.closePath();cx.fill();
  }
  // HP bar
  if(e.maxHp>1){
    const bw=e.sz*1.8,bh=3;
    cx.rotate(-(e.ang+Math.PI/2));
    cx.fillStyle='rgba(0,0,0,.7)';cx.fillRect(-bw/2,e.sz+5,bw,bh);
    const pct=e.hp/e.maxHp;
    cx.fillStyle=pct>.5?'#4CAF50':pct>.25?'#C8A84B':'#C0001A';
    cx.fillRect(-bw/2,e.sz+5,bw*pct,bh);
  }
  cx.restore();
}

function draw(){
  // BG
  cx.fillStyle='#080808';cx.fillRect(0,0,cv.width,cv.height);
  // Vignette
  const vg=cx.createRadialGradient(cv.width/2,cv.height/2,0,cv.width/2,cv.height/2,cv.width*.72);
  vg.addColorStop(0,'rgba(0,0,0,0)');vg.addColorStop(1,'rgba(0,0,0,.55)');
  cx.fillStyle=vg;cx.fillRect(0,0,cv.width,cv.height);
  // Grid
  cx.strokeStyle='rgba(200,168,75,.025)';cx.lineWidth=1;
  for(let x=0;x<cv.width;x+=55){cx.beginPath();cx.moveTo(x,0);cx.lineTo(x,cv.height);cx.stroke();}
  for(let y=0;y<cv.height;y+=55){cx.beginPath();cx.moveTo(0,y);cx.lineTo(cv.width,y);cx.stroke();}
  // Stars
  stars.forEach(s=>{cx.beginPath();cx.arc(s.x,s.y,s.r,0,Math.PI*2);cx.fillStyle=`rgba(237,229,204,${s.a})`;cx.fill();});
  // Particles
  parts.forEach(p=>{cx.save();cx.globalAlpha=p.life;cx.beginPath();cx.arc(p.x,p.y,p.r*p.life,0,Math.PI*2);cx.fillStyle=p.col;cx.fill();cx.restore();});
  // Enemy bullets
  eBullets.forEach(b=>{cx.save();cx.shadowColor=b.col;cx.shadowBlur=10;cx.beginPath();cx.arc(b.x,b.y,b.r,0,Math.PI*2);cx.fillStyle=b.col;cx.fill();cx.restore();});
  // Player bullets — stylized
  bullets.forEach(b=>{
    cx.save();cx.translate(b.x,b.y);cx.rotate(Math.atan2(b.vy,b.vx));
    cx.shadowColor='#E2C06A';cx.shadowBlur=12;
    const g=cx.createLinearGradient(-14,0,14,0);
    g.addColorStop(0,'rgba(242,193,68,0)');g.addColorStop(.5,'#F5E4A8');g.addColorStop(1,'rgba(242,193,68,0)');
    cx.fillStyle=g;cx.beginPath();cx.ellipse(0,0,14,b.r,0,0,Math.PI*2);cx.fill();
    cx.restore();
  });
  // Enemies
  enemies.forEach(drawEnemy);
  // Player
  const ch=CHARS[selChar];
  if(!(P.invinc>0&&Math.floor(P.invinc*10)%2===0)){
    cx.save();cx.shadowColor=ch.color;cx.shadowBlur=16;
    const ang=Math.atan2(myP-P.y,mxP-P.x)+Math.PI/2;
    ch.draw(P.x,P.y,ang,cx);
    cx.restore();
  }
  // Scan line
  const sl=(Date.now()*.035)%cv.height;
  cx.fillStyle='rgba(200,168,75,.012)';cx.fillRect(0,sl,cv.width,2);
}

/* ═══════════════════════════════════════════
   GAME LOOP
═══════════════════════════════════════════ */
function loop(ts){
  if(gState!=='play')return;
  const dt=Math.min((ts-lastTS)/1000,.05);lastTS=ts;
  update(dt);draw();
  animID=requestAnimationFrame(loop);
}

/* ═══════════════════════════════════════════
   MENU LOOP (background animation)
═══════════════════════════════════════════ */
let menuAnimActive=false;
function menuLoop(ts){
  if(!menuAnimActive)return;
  const dt=Math.min((ts-(menuLoop._l||ts))/1000,.05);menuLoop._l=ts;
  stars.forEach(s=>{s.y+=s.spd*dt;if(s.y>cv.height){s.y=0;s.x=Math.random()*cv.width;}});
  cx.fillStyle='#080808';cx.fillRect(0,0,cv.width,cv.height);
  stars.forEach(s=>{cx.beginPath();cx.arc(s.x,s.y,s.r,0,Math.PI*2);cx.fillStyle=`rgba(237,229,204,${s.a})`;cx.fill();});
  cx.fillStyle='rgba(8,8,8,0.72)';cx.fillRect(0,0,cv.width,cv.height);
  requestAnimationFrame(t=>{menuLoop._l=t;menuLoop(t);});
}

/* ═══════════════════════════════════════════
   END GAME
═══════════════════════════════════════════ */
function endGame(){
  gState='over';clearInterval(timerID);bgStop();cancelAnimationFrame(animID);
  addLB(pName,score);
  document.getElementById('f-score').textContent=score.toLocaleString();
  document.getElementById('f-rank').textContent=rankMsg(score);
  renderLB(score);
  showScr('s-over');
  document.getElementById('hud').classList.add('off');
  document.getElementById('mctrl').classList.add('off');
  menuAnimActive=true;requestAnimationFrame(t=>{menuLoop._l=t;menuLoop(t);});
}

/* ═══════════════════════════════════════════
   SCREEN HELPER
═══════════════════════════════════════════ */
function showScr(id){
  document.querySelectorAll('.scr').forEach(s=>s.classList.add('off'));
  if(id)document.getElementById(id).classList.remove('off');
}

/* ═══════════════════════════════════════════
   INPUT
═══════════════════════════════════════════ */
document.addEventListener('keydown',e=>{keys[e.code]=true;});
document.addEventListener('keyup',e=>{keys[e.code]=false;});
cv.addEventListener('mousemove',e=>{
  mxP=e.clientX;myP=e.clientY;
  const xh=document.getElementById('xhair');xh.style.left=e.clientX+'px';xh.style.top=e.clientY+'px';
},{passive:true});
cv.addEventListener('mousedown',e=>{if(e.button===0){shooting=true;wake();}});
cv.addEventListener('mouseup',e=>{if(e.button===0)shooting=false;});
cv.style.cursor='none';

/* ═══ JOYSTICK ═══ */
const jz=document.getElementById('joystick-zone');
const jk=document.getElementById('joystick-knob');
const JR=55;
function jMove(cx2,cy2){
  const r=jz.getBoundingClientRect();
  const ox=cx2-r.left-r.width/2,oy=cy2-r.top-r.height/2;
  const dist=Math.hypot(ox,oy),cap=Math.min(dist,JR);
  const nx=dist>0?ox/dist:0,ny=dist>0?oy/dist:0;
  jk.style.left=(50+nx*cap/r.width*100)+'%';
  jk.style.top=(50+ny*cap/r.height*100)+'%';
  joystick.dx=nx*(cap/JR);joystick.dy=ny*(cap/JR);
}
jz.addEventListener('touchstart',e=>{e.preventDefault();wake();joystick.active=true;jMove(e.touches[0].clientX,e.touches[0].clientY);},{passive:false});
jz.addEventListener('touchmove',e=>{e.preventDefault();jMove(e.touches[0].clientX,e.touches[0].clientY);},{passive:false});
jz.addEventListener('touchend',e=>{e.preventDefault();joystick.active=false;joystick.dx=0;joystick.dy=0;jk.style.left='50%';jk.style.top='50%';},{passive:false});
jz.addEventListener('mousedown',e=>{joystick.active=true;jMove(e.clientX,e.clientY);});
document.addEventListener('mousemove',e=>{if(joystick.active)jMove(e.clientX,e.clientY);});
document.addEventListener('mouseup',()=>{if(joystick.active){joystick.active=false;joystick.dx=0;joystick.dy=0;jk.style.left='50%';jk.style.top='50%';}});

/* ═══ FIRE BUTTON ═══ */
const fb=document.getElementById('fire-btn');
fb.addEventListener('touchstart',e=>{e.preventDefault();shooting=true;wake();},{passive:false});
fb.addEventListener('touchend',e=>{e.preventDefault();shooting=false;},{passive:false});
fb.addEventListener('mousedown',()=>{shooting=true;wake();});
fb.addEventListener('mouseup',()=>shooting=false);

  animID=requestAnimationFrame(loop);
});

document.getElementById('btn-replay').addEventListener('click',()=>{
  wake();menuAnimActive=false;
  showScr(null);
  document.getElementById('hud').classList.remove('off');
  if(window.innerWidth<=768)document.getElementById('mctrl').classList.remove('off');
  gState='play';
  initGame();lastTS=performance.now();
  animID=requestAnimationFrame(loop);

document.getElementById('btn-menu').addEventListener('click',()=>{
  bgStop();gState='menu';menuAnimActive=true;
  showScr('s-start');
  document.getElementById('hud').classList.add('off');
  document.getElementById('mctrl').classList.add('off');
  document.getElementById('htimer').classList.remove('warn');
  requestAnimationFrame(t=>{menuLoop._l=t;menuLoop(t);});
});

document.getElementById('btn-scores-main').addEventListener('click',()=>{

  document.getElementById('f-score').textContent='—';
  document.getElementById('f-rank').textContent='HALL OF FAME';
});

document.getElementById('pname').addEventListener('keydown',e=>{if(e.key==='Enter')document.getElementById('btn-start').click();});

/* ═══════════════════════════════════════════
   BOOT
═══════════════════════════════════════════ */
initStars();menuAnimActive=true;
requestAnimationFrame(t=>{menuLoop._l=t;menuLoop(t);});
</script>
